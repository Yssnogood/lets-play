spring.application.name=crud-api
spring.data.mongodb.uri=mongodb://localhost:27017/cruddb
spring.data.mongodb.auto-index-creation=true
# Run HTTPS on 8443 in dev
server.port=8443
# Additional HTTP port (we'll add an embedded Tomcat connector to redirect to HTTPS)
server.http.port=8081

# JWT secret - prefer using an environment variable in production
# Example: export JWT_SECRET="a-very-long-random-secret-at-least-32-chars"
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-32chars!!}
# Expiration in milliseconds (default 1 hour)
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}

# SSL (development keystore located in classpath)
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
